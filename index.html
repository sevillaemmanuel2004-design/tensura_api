<!DOCTYPE html>
<html>
<head>
    <title>Tensura Fanbase</title>
</head>
<body>

    <h1>Tensura Characters</h1>
    <button onclick="loadCharacters()">Load Characters</button>
<h1>Test API</h1>

    <ul id="characterList"></ul>
<button onclick="test()">Click me</button>

    <h1>Actors</h1>
    <button onclick="loadActors()">Load Actors</button>

    <ul id="actorList"></ul>

    <script>
    const API_URL = "https://tensura-api.onrender.com";
    
    async function loadCharacters() {
        console.log("loading characters...");
    
        try {
            const res = await fetch(`${API_URL}/characters`);
            const data = await res.json();
    
            console.log(data);
    
            const list = document.getElementById("characterList");
            list.innerHTML = "";
    
            data.forEach(char => {
                const li = document.createElement("li");
                li.textContent = `${char.name} - ${char.title}`;
                list.appendChild(li);
            });
    
        } catch (err) {
            console.error("Error loading characters:", err);
        }
    }
    
    async function loadActors() {
        console.log("loading actors...");
    
        try {
            const res = await fetch(`${API_URL}/actors`);
            const data = await res.json();
    
            console.log(data);
    
            const list = document.getElementById("actorList");
            list.innerHTML = "";
    
            data.forEach(actor => {
                const li = document.createElement("li");
                li.textContent = `${actor.name} (${actor.nationality})`;
                list.appendChild(li);
            });
    
        } catch (err) {
            console.error("Error loading actors:", err);
        }
    }
    </script>

</body>
</html>
