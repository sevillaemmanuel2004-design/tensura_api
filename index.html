<!DOCTYPE html>
<html>
<head>
    <title>Tensura API Tester</title>
</head>
<body>

<h1> Tensura API Tester</h1>

<input id="endpoint" placeholder="Enter endpoint (e.g. /get or /get/1)" style="width:300px;">
<button onclick="callAPI()">Send Request</button>

<h2>Response:</h2>
<pre id="output"></pre>

<script>
const BASE_URL = "https://tensura-api.onrender.com";

async function callAPI() {
    const endpoint = document.getElementById("endpoint").value;

    try {
        const res = await fetch(BASE_URL + endpoint);
        const data = await res.json();

        document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);

    } catch (err) {
        document.getElementById("output").textContent =
            "Error: " + err;
    }
}
</script>

</body>
</html>
